name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - 'index.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'icon.svg'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4

      - name: Copier les assets web à jour
        run: |
          cp ../index.html www/index.html
          cp ../manifest.webmanifest www/manifest.webmanifest
          cp ../sw.js www/sw.js
          cp ../icon.svg www/icon.svg

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installer les dépendances
        run: npm ci

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Construire l'APK debug
        working-directory: android-app/android
        run: ./gradlew assembleDebug

      - name: Publier l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: fitlight-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Joindre l'APK à une Release GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/android/app/build/outputs/apk/debug/app-debug.apk
